steps:
  # Pull previous image
  - name: gcr.io/cloud-builders/docker
    args:
      - '-c'
      - 'docker pull gcr.io/$PROJECT_ID/$_IMAGE_NAME:latest || exit 0'
    entrypoint: bash

  # Build image
  - name: gcr.io/cloud-builders/docker
    args:
      - '-c'
      - >
        cp -r patches yarn.lock packages/$_TARGET_PACKAGE

        cd packages/$_TARGET_PACKAGE

        docker build -t gcr.io/$PROJECT_ID/$_IMAGE_NAME:${BRANCH_NAME}_${SHORT_SHA} \

        -t gcr.io/$PROJECT_ID/$_IMAGE_NAME:latest \

        --build-arg RECAPTCHA_ENABLED=$_RECAPTCHA_ENABLED \

        --build-arg RECAPTCHA_SITE_KEY=$_RECAPTCHA_SITE_KEY \

        --cache-from gcr.io/$PROJECT_ID/$_IMAGE_NAME:latest .

    entrypoint: bash

  # Push container image to registry
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - 'gcr.io/$PROJECT_ID/$_IMAGE_NAME:${BRANCH_NAME}_${SHORT_SHA}'

  # Generate SBOM with Syft (https://github.com/anchore/syft)
  - name: gcr.io/cloud-builders/docker
    id: Generate SBOM
    entrypoint: bash
    args:
      - '-c'
      - |
        curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
        syft gcr.io/$PROJECT_ID/$_IMAGE_NAME:${BRANCH_NAME}_${SHORT_SHA} \
          -o spdx-json \
          --file /workspace/sbom.spdx.json
        echo "SBOM generated: $(python3 -c "import json; d=json.load(open('/workspace/sbom.spdx.json')); print(str(len(d.get('packages',[]))) + ' packages')" 2>/dev/null || echo 'see sbom.spdx.json')"

  # Upload SBOM to Cloud Storage (set _SBOM_BUCKET in trigger substitutions to enable)
  - name: gcr.io/cloud-builders/gsutil
    id: Upload SBOM
    entrypoint: bash
    args:
      - '-c'
      - |
        if [ -n "${_SBOM_BUCKET}" ]; then
          gsutil cp /workspace/sbom.spdx.json \
            gs://${_SBOM_BUCKET}/$_IMAGE_NAME/${BRANCH_NAME}_${SHORT_SHA}.spdx.json
          echo "SBOM uploaded to gs://${_SBOM_BUCKET}/$_IMAGE_NAME/${BRANCH_NAME}_${SHORT_SHA}.spdx.json"
        else
          echo "SBOM generated but not uploaded. Set _SBOM_BUCKET in trigger substitutions to enable persistent storage."
        fi

  # Deploy container image to Cloud Runs
  - name: gcr.io/cloud-builders/gcloud
    id: Deploy Image
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        # read cloud run service names from substitution variable
        IFS=',' read -r -a cloud_runs <<< "$_CLOUD_RUN_SERVICE_NAMES"

        for cr in "${cloud_runs[@]}"
        do
          # deploy cloud run service iteratively
          gcloud run deploy "$cr" --image gcr.io/$PROJECT_ID/$_IMAGE_NAME:${BRANCH_NAME}_${SHORT_SHA} --region asia-east1
        done

  # Push container image to registry to update the latest one
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - 'gcr.io/$PROJECT_ID/$_IMAGE_NAME:latest'

timeout: 2400s

options:
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _TARGET_PACKAGE: '' # default value
  _IMAGE_NAME: '' # default value
  _CLOUD_RUN_SERVICE_NAMES: '' # default value
  _RECAPTCHA_ENABLED: 'false' # default value
  _RECAPTCHA_SITE_KEY: '' # default value
  _SBOM_BUCKET: '' # optional: GCS bucket for SBOM storage, e.g. your-project-sbom
